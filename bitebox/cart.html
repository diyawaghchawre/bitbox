          <!-- Menu -->
           <ul>

    <section class="Cart"><br> <br>
      <table>
        <thead>
          <th>Item</th>

          <th>Qty</th>
          <th>Total</th>
          <th>Remove</th>
        </thead>

        <tbody>
          <tr>
            <td class="Item"> 
              <img src="images/burger2.jpg" alt="" height="180px" width="200px">
              <div>
                <h4>Cheesy Burger</h4>
                <p>Juicy Grilled Burger</p>
              </div>
            </td>
            <td>Rs.199</td>
            <td>
              <div class="qty-box">
              <button>-</button>
              <span>1</span>
              <button>+</button>
            </div>
            </td>
            <td>Rs.199</td>
            <td>
              <Button class="remove">X</Button>
            </td> 
          </tr>

            
            <td class="Item"> 
              <img src="images/sushi2.jpg" alt="" height="180px" width="200px">
              <div>
                <h4>Sushi</h4>
                <p>platters of sushi</p>
              </div>
            </td>
            <td>Rs.499</td>
            <td>
              <div class="qty-box">
              <button>-</button>
              <span>1</span>
              <button>+</button>
            </div>
            </td>
            <td>Rs.499</td>
            <td>
              <Button class="remove">X</Button>
            </td> 
          </tr>
          <tr class="grand-total">
              <td colspan="3">Grand Total</td>
              <td>Rs.698</td>
              <td><Button>Proceed</Button></td>
            </tr>

            <tr>


          
        </tbody>
