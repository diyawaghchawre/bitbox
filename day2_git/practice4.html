<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tag</title>
</head>
<body>
    <h1>Using Form Tag</h1>
    <form>
   <label for="">Username:</label> <input type="text" name="user" id="text_input" placeholder="enter name"><br> <br>
     <label for="">Password:</label> <input type="password" name="pass" placeholder="enter password"><br> <br>
     <label for="">Email:</label> <input type="email" name="email" required placeholder="enter email"><br><br>
      <!-- <input type="number">
      <input type="date">
      <input type="file"> -->
      <label for="">Courses:</label><br>
     <label for="">Java</label> <input type="checkbox">
     <label for="">C++</label> <input type="checkbox">
     <label for="">Python</label> <input type="checkbox">
     <label for="">Data Science</label> <input type="checkbox"><br><br>
      <label for="">Gender:</label><br>
     <label for="">Male</label> <input type="radio" value="male" id="male" name="gender">
     <label for="">Female</label> <input type="radio" value="female" id="female" name="gender">
     <label for="">Other </label> <input type="radio" value="other" id="other" name="gender"><br><br>
      <input type="submit">
      <input type="reset">
      <button type="submit">Registration</button>
      <button type="submit">Click</button>

    </form>
</body>
</html>
